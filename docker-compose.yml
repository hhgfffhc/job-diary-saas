version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: jobdiary_db
    environment:
      POSTGRES_USER: jobdiary
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_change_me}
      POSTGRES_DB: jobdiary_saas
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobdiary"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jobdiary_network

  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: jobdiary_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password_change_me}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jobdiary_network

  # Flask Web Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobdiary_web
    command: gunicorn -w 4 -b 0.0.0.0:5000 app:app
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://jobdiary:${DB_PASSWORD:-secure_password_change_me}@db:5432/jobdiary_saas
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis_password_change_me}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis_password_change_me}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
      STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      MAIL_SERVER: ${MAIL_SERVER:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    volumes:
      - ./uploads:/app/uploads
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jobdiary_network
    restart: unless-stopped

  # Celery Worker
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobdiary_celery_worker
    command: celery -A app.celery worker -l info --concurrency=4
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://jobdiary:${DB_PASSWORD:-secure_password_change_me}@db:5432/jobdiary_saas
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis_password_change_me}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis_password_change_me}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
      MAIL_SERVER: ${MAIL_SERVER:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    depends_on:
      - db
      - redis
    networks:
      - jobdiary_network
    restart: unless-stopped

  # Celery Beat Scheduler
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobdiary_celery_beat
    command: celery -A app.celery beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://jobdiary:${DB_PASSWORD:-secure_password_change_me}@db:5432/jobdiary_saas
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis_password_change_me}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis_password_change_me}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
    depends_on:
      - db
      - redis
    networks:
      - jobdiary_network
    restart: unless-stopped

  # NGINX Reverse Proxy (Optional but recommended)
  nginx:
    image: nginx:alpine
    container_name: jobdiary_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    networks:
      - jobdiary_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  jobdiary_network:
    driver: bridge
